<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button Frame</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: sans-serif;
        background: #f1ead8;
        color: #1d251b;
      }

      .back-button {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 96px;
        min-height: 44px;
        border-radius: 8px;
        padding: 0 1rem;
        color: #547f46;
        background: #ffffff;
        border: 1px solid #9eb994;
        text-decoration: none;
        font-weight: 700;
        box-shadow: 0 8px 18px rgba(54, 82, 45, 0.14);
        transition:
          transform 0.2s ease,
          background 0.2s ease,
          color 0.2s ease;
      }

      .back-button:hover,
      .back-button:focus-visible {
        color: #ffffff;
        background: #446f38;
        transform: translateY(-2px);
      }

      main {
        width: min(1100px, calc(100% - 32px));
        min-height: 100vh;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 48px;
      }

      .camera-panel {
        flex: 1 1 520px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .camera-container {
        width: 100%;
        aspect-ratio: 4 / 4;
        min-height: 320px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px dashed #8aa87f;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 14px 30px rgba(54, 82, 45, 0.12);
        overflow: hidden;
      }

      video {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        transform: scaleX(-1);
      }

      .camera-status {
        margin: 0;
        min-height: 1.25rem;
        color: #57734f;
        font-size: 0.95rem;
      }

      .camera-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
      }

      button {
        min-width: 180px;
        border: 0;
        border-radius: 8px;
        padding: 0.85rem 1.25rem;
        font: inherit;
        font-weight: 700;
        color: #ffffff;
        background: #547f46;
        cursor: pointer;
        box-shadow: 0 8px 18px rgba(54, 82, 45, 0.18);
        transition:
          transform 0.2s ease,
          background 0.2s ease;
      }

      button:hover,
      button:focus-visible {
        background: #446f38;
        transform: translateY(-2px);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
        transform: none;
      }

      button.is-hidden {
        display: none;
      }

      .next-button {
        min-width: 180px;
        border-radius: 8px;
        padding: 0.85rem 1.25rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #ffffff;
        background: #547f46;
        text-decoration: none;
        font: inherit;
        font-weight: 700;
        box-shadow: 0 8px 18px rgba(54, 82, 45, 0.18);
        transition:
          transform 0.2s ease,
          background 0.2s ease;
      }

      .next-button:hover,
      .next-button:focus-visible {
        background: #446f38;
        transform: translateY(-2px);
      }

      .next-button.is-hidden {
        display: none;
      }

      .redo-button {
        color: #547f46;
        background: #ffffff;
        border: 1px solid #9eb994;
      }

      .redo-button:hover,
      .redo-button:focus-visible {
        color: #ffffff;
        background: #446f38;
      }

      .frame-preview {
        flex: 0 1 360px;
        display: flex;
        justify-content: center;
      }

      .photo-frame {
        position: relative;
        width: 100%;
        max-width: 360px;
        aspect-ratio: 2 / 3;
      }

      .photo-slot {
        position: absolute;
        left: 18.55%;
        width: 62.5%;
        height: 41.67%;
        object-fit: cover;
        display: none;
        z-index: 2;
      }

      .photo-slot.has-photo {
        display: block;
      }

      .photo-slot.top {
        top: 8.35%;
      }

      .photo-slot.bottom {
        top: 51.6%;
      }

      .frame-preview .frame-image {
        width: 100%;
        height: auto;
        display: block;
        border: 1px solid #b8c9b1;
        box-shadow: 0 14px 30px rgba(54, 82, 45, 0.18);
      }

      @media (max-width: 800px) {
        main {
          padding: 32px 0;
          flex-direction: column;
          gap: 28px;
        }

        .camera-container,
        .frame-preview {
          width: 100%;
          flex-basis: auto;
        }
      }
    </style>
  </head>
  <body>
    <a class="back-button" href="../start.html">Back</a>
    <main>
      <section class="camera-panel" aria-label="Camera">
        <div class="camera-container">
          <video id="camera" autoplay muted playsinline></video>
        </div>
        <div class="camera-actions">
          <button id="captureButton" type="button" disabled>Capture</button>
          <button class="redo-button" id="redoButton" type="button" disabled>
            Redo
          </button>
          <a
            class="next-button is-hidden"
            id="nextButton"
            href="stickerButtonFrame.html"
          >
            Next
          </a>
        </div>
        <p class="camera-status" id="cameraStatus">Starting camera...</p>
      </section>

      <aside class="frame-preview" aria-label="Button frame preview">
        <div class="photo-frame">
          <img class="photo-slot top" id="topPhoto" alt="Top captured photo" />
          <img
            class="photo-slot bottom"
            id="bottomPhoto"
            alt="Bottom captured photo"
          />
          <img
            class="frame-image"
            src="../assets/frames/buttonFrame2.png"
            alt="Button frame preview"
          />
        </div>
      </aside>
    </main>
    <canvas id="snapshotCanvas" hidden></canvas>
    <script>
      const video = document.getElementById("camera");
      const captureButton = document.getElementById("captureButton");
      const redoButton = document.getElementById("redoButton");
      const nextButton = document.getElementById("nextButton");
      const cameraStatus = document.getElementById("cameraStatus");
      const canvas = document.getElementById("snapshotCanvas");
      const photoSlots = [
        document.getElementById("topPhoto"),
        document.getElementById("bottomPhoto"),
      ];
      let nextSlot = 0;
      let lastCapturedSlot = -1;

      async function startCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user" },
            audio: false,
          });

          video.srcObject = stream;
          video.addEventListener(
            "loadedmetadata",
            () => {
              captureButton.disabled = false;
              cameraStatus.textContent = "Camera ready";
            },
            { once: true },
          );
        } catch (error) {
          cameraStatus.textContent =
            "Camera access was blocked or is unavailable.";
        }
      }

      function capturePhoto() {
        const size = Math.min(video.videoWidth, video.videoHeight);
        const sourceX = (video.videoWidth - size) / 2;
        const sourceY = (video.videoHeight - size) / 2;

        canvas.width = 900;
        canvas.height = 900;

        const context = canvas.getContext("2d");
        context.translate(canvas.width, 0);
        context.scale(-1, 1);
        context.drawImage(
          video,
          sourceX,
          sourceY,
          size,
          size,
          0,
          0,
          canvas.width,
          canvas.height,
        );

        const currentSlot = photoSlots[nextSlot];
        currentSlot.src = canvas.toDataURL("image/png");
        currentSlot.classList.add("has-photo");

        lastCapturedSlot = nextSlot;
        nextSlot = (nextSlot + 1) % photoSlots.length;
        redoButton.disabled = false;
        const allSlotsFilled = photoSlots.every((slot) =>
          slot.classList.contains("has-photo"),
        );

        if (allSlotsFilled) {
          captureButton.classList.add("is-hidden");
          nextButton.classList.remove("is-hidden");
        } else {
          captureButton.textContent = "Capture Next";
        }
      }

      function redoLastPhoto() {
        if (lastCapturedSlot === -1) {
          return;
        }

        const previousSlot = photoSlots[lastCapturedSlot];
        previousSlot.removeAttribute("src");
        previousSlot.classList.remove("has-photo");
        nextSlot = lastCapturedSlot;
        lastCapturedSlot = -1;
        redoButton.disabled = true;
        captureButton.classList.remove("is-hidden");
        nextButton.classList.add("is-hidden");
        captureButton.textContent = nextSlot === 0 ? "Capture" : "Capture Next";
      }

      captureButton.addEventListener("click", capturePhoto);
      redoButton.addEventListener("click", redoLastPhoto);
      startCamera();
    </script>
  </body>
</html>
