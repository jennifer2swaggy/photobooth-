<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Final Blue Frame</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: sans-serif;
        background: #f1ead8;
        color: #1d251b;
      }

      .back-button {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 96px;
        min-height: 44px;
        border-radius: 8px;
        padding: 0 1rem;
        color: #547f46;
        background: #ffffff;
        border: 1px solid #9eb994;
        text-decoration: none;
        font-weight: 700;
        box-shadow: 0 8px 18px rgba(54, 82, 45, 0.14);
        transition:
          transform 0.2s ease,
          background 0.2s ease,
          color 0.2s ease;
      }

      .back-button:hover,
      .back-button:focus-visible {
        color: #ffffff;
        background: #446f38;
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <a class="back-button" href="captureBlueFrame.html">Back</a>
  </body>
</html>
